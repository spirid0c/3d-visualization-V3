<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="IsoGSM 3D — Atmospheric water vapor tracer dynamics">
    <title>IsoGSM — Atmospheric Vapor Tracer</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "netcdfjs": "https://esm.sh/netcdfjs",
                "grib2js": "https://esm.sh/grib2js"
            }
        }
    </script>
</head>

<body>
    <script>
        if (window.location.protocol === 'file:') {
            alert('Protocol error: serve via a local HTTP server (Live Server, python -m http.server, etc.)');
        }
    </script>

    <div id="date-banner">
        <span id="date-display">01 JUL 2017</span>
    </div>

    <div id="ui-panel">
        <div class="tabs">
            <div id="tab-archives" class="tab active-tab">Archives</div>
            <div id="tab-upload" class="tab">Import Local</div>
        </div>

        <div id="upload-view" style="display:none; flex-direction: column; width: 100%; margin-top: 15px;">

            <button id="btn-back-archives"
                style="width: 100%; background: transparent; border: 1px solid #555; color: #ccc; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; text-align: center; transition: 0.2s;">
                ← Retour aux Archives
            </button>

            <div id="drop-zone-box"
                style="width: 100%; margin-top: 40px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0;">
                <p style="margin: 0 0 5px 0;">Glissez vos fichiers ici</p>
                <p style="font-size: 10px; color: #888; margin: 0 0 15px 0;">(.nc, .bin, .ft supportés)</p>
                <button id="btn-browse" style="cursor: pointer; padding: 6px 16px;">Parcourir</button>
                <input type="file" id="file-input" style="display: none;">
            </div>
        </div>

        <div id="archive-specific-ui">
            <div class="ui-row">
                <label class="ui-label">Period</label>
                <select id="season-selector">
                    <option value="0">Summer (July 2017)</option>
                    <option value="1">Winter (January 2018)</option>
                </select>
            </div>
            <div class="ui-row">
                <label class="ui-label">Tracer</label>
                <span id="dataset-label">PWAT1 — Japan</span>
            </div>
            <div class="ui-row">
                <label class="ui-label">Simulation Day</label>
                <span id="frame-label">1 / 91</span>
            </div>
            <hr>
            <button id="toggle-data">Switch Tracer (Japan ↔ Brazil)</button>
        </div>

        <div id="common-ui">
            <div id="playback-row">
                <button id="btn-toggle-view" style="background:#444; margin-bottom: 12px;">Vue : Globe 3D</button>
                <button id="btn-play" class="play-btn">▶ Play</button>
                <div class="slider-wrap">
                    <input type="range" id="time-slider" min="0" max="90" value="0">
                </div>
            </div>

            <div class="legend">
                <div class="legend-title">Atmospheric Vapor [kg/m²]</div>
                <div class="color-blocks">
                    <div style="background:#2e70c5">Tr</div>
                    <div style="background:#b2e5ff"></div>
                    <div style="background:#66ccff"></div>
                    <div style="background:#00ffff"></div>
                    <div style="background:#00cc00"></div>
                    <div style="background:#80ff00"></div>
                    <div style="background:#ffff00"></div>
                    <div style="background:#ffcc00"></div>
                    <div style="background:#ff9900"></div>
                    <div style="background:#ff6600"></div>
                    <div style="background:#ff0000"></div>
                    <div style="background:#cc0000"></div>
                    <div style="background:#990000"></div>
                    <div style="background:#ff00ff">&gt;10</div>
                </div>
                <div class="color-labels">
                    <span>0.001</span>
                    <span>0.05</span>
                    <span>10.0</span>
                </div>
            </div>
        </div>
    </div>

    <main id="main-content">
        <div id="canvas-container"></div>
        <div id="canvas-2d-container" style="display:none;">
            <canvas id="canvas-2d"></canvas>
        </div>


    </main>

    <script type="module" src="main.js"></script>
</body>

</html>
